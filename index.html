<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>PopMash</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🎧 PopMash</h1>
<p>Comparación A/B para construir rankings de pop latino.</p>

<div class="container">

<!-- CONFIGURA -->

<div class="card">

<h2>1) Configura</h2>

<label>Tipo de oyente</label>
<select id="listener">
<option value="nuevo">Nuevo oyente</option>
<option value="casual">Fan casual</option>
<option value="musico">Músico</option>
</select>

<label>Contexto</label>
<select id="context">
<option>¿Cuál funciona mejor en concierto?</option>
<option>¿Cuál suena mejor con audífonos?</option>
<option>¿Cuál tiene mejor historia?</option>
<option>¿Cuál tiene mejor riff?</option>
</select>

<button onclick="newBattle()">Nuevo duelo</button>
<button onclick="resetVotes()">Reiniciar</button>

<p style="opacity:0.6;margin-top:15px;">
El ranking cambia según quién escucha y para qué.
</p>

</div>

<!-- ELIGE -->

<div class="card">

<h2>2) Elige</h2>

<p id="question">¿Cuál es mejor?</p>

<div class="duel">

<div id="optionA" class="song" onclick="vote(0)"></div>

<div class="vs">VS</div>

<div id="optionB" class="song" onclick="vote(1)"></div>

</div>

<div style="margin-top:20px;">
<button onclick="showTop()">Ver Top 10</button>
<button onclick="exportVotes()">Exportar votos</button>
</div>

</div>

<!-- RANKING -->

<div class="card">

<h2>3) Ranking (Top 10)</h2>

<div id="rankingList"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
